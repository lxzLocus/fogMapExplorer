<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="reveal" cx="50%" cy="46%" r="46%">
      <stop offset="0%" stop-color="#12203a" />
      <stop offset="55%" stop-color="#0a0d12" />
      <stop offset="100%" stop-color="#05070b" />
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>

  <!-- dark base -->
  <rect width="512" height="512" fill="#0a0d12" />
  <rect width="512" height="512" fill="url(#reveal)" />

  <!-- fog grid, fading toward the revealed centre -->
  <g stroke="#152033" stroke-width="2" opacity="0.5">
    <path d="M0 96H512M0 192H512M0 320H512M0 416H512" />
    <path d="M96 0V512M192 0V512M320 0V512M416 0V512" />
  </g>

  <!-- revealed radius -->
  <circle cx="256" cy="236" r="150" fill="#0a0d12" />
  <circle cx="256" cy="236" r="150" fill="#7CFC9B" fill-opacity="0.06" />
  <circle cx="256" cy="236" r="150" fill="none" stroke="#7CFC9B" stroke-opacity="0.22" stroke-width="3" />

  <!-- player heading arrow -->
  <g filter="url(#glow)">
    <path d="M256 146 L322 302 L256 266 L190 302 Z" fill="#7CFC9B" fill-opacity="0.55" />
  </g>
  <path d="M256 146 L322 302 L256 266 L190 302 Z" fill="#7CFC9B" />
</svg>
